<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Mon vaisseau</title>

    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }
      canvas {
        border: 1px solid green;
        background: black;
      }
      /* Le bouton Rejouer : caché au départ, posé par-dessus le canvas, au centre */
      #rejouer {
        display: none; /* invisible tant que la partie tourne */
        position: absolute;
        top: 60%;
        left: 50%;
        transform: translate(-50%, -50%);
        padding: 15px 30px;
        font-size: 24px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <canvas id="monCanvas" width="1000" height="1000"></canvas>
    <button id="rejouer">Rejouer</button>

    <script>
      const canvas = document.getElementById("monCanvas");
      const ctx = canvas.getContext("2d");

      // Taille du terrain de jeu (le canvas)
      const LARGEUR = 1000;
      const HAUTEUR = 1000;

      // Réglages du vaisseau (change ces nombres pour tester !)
      const RAYON_VAISSEAU = 15; // taille du vaisseau (du centre à la pointe)
      const ACCELERATION = 0.2; // poussée de la flèche du haut
      const VITESSE_MAX = 8; // vitesse maximum
      const ROTATION = 0.07; // vitesse pour tourner
      const FROTTEMENT = 0.99; // ralentit doucement tout seul
      const FREINAGE = 0.95; // ralentit vite avec la flèche du bas

      // Réglages des missiles
      const VITESSE_MISSILE = 10; // vitesse des boules
      const RAYON_MISSILE = 4; // taille des boules

      // Réglages des astéroïdes
      const RAYON_AST = 40; // taille (bien plus gros que le vaisseau)
      const VITESSE_AST = 1; // vitesse faible
      const INTERVALLE_AST = 4000; // un nouvel astéroïde toutes les 4 secondes
      const MAX_AST = 4; // 4 astéroïdes maximum en même temps

      // Réglages de l'invincibilité (après un choc)
      const INVINCIBLE_DUREE = 2000; // durée d'invincibilité en ms (2 secondes)
      const CLIGNOTEMENT = 150; // vitesse du clignotement en ms (plus petit = clignote plus vite)

      // Fabrique un état neuf, comme au tout début d'une partie.
      // On l'écrit ICI une seule fois : utilisé au lancement ET dans rejouer().
      function etatInitial() {
        return {
          x: LARGEUR / 2,
          y: HAUTEUR / 2,
          angle: -Math.PI / 2, // direction où il pointe (vers le haut au départ)
          vitesseX: 0, // de combien il glisse à gauche/droite
          vitesseY: 0, // de combien il glisse en haut/bas
          // quelles flèches sont enfoncées en ce moment
          touches: {
            haut: false,
            bas: false,
            gauche: false,
            droite: false,
          },
          // les listes d'objets qui apparaissent et disparaissent pendant le jeu
          missiles: [], // les petites boules tirées avec Espace
          asteroides: [], // les gros cailloux qui se déplacent
          explosions: [], // les petites animations quand un astéroïde explose
          // le score et les points de vie
          score: 0, // +10 à chaque astéroïde cassé
          vies: 3, // les cœurs (3 maximum)
          prochainCoeur: 100, // le prochain palier de score qui donnera un cœur
          invincibleJusqua: 0, // repère de temps : invincible tant qu'on n'a pas dépassé ce moment
          partieFinie: false, // devient vrai quand il n'y a plus de cœurs
        };
      }

      // L'état de l'application
      let etat = etatInitial();

      // Distance entre deux points (a et b). Sert à détecter les collisions.
      function distance(ax, ay, bx, by) {
        const dx = ax - bx;
        const dy = ay - by;
        return Math.sqrt(dx * dx + dy * dy);
      }

      // Quand on APPUIE sur une flèche
      document.addEventListener("keydown", function (event) {
        if (event.key === "ArrowUp") etat.touches.haut = true;
        if (event.key === "ArrowDown") etat.touches.bas = true;
        if (event.key === "ArrowLeft") etat.touches.gauche = true;
        if (event.key === "ArrowRight") etat.touches.droite = true;

        // Barre Espace : on crée un missile à la pointe du triangle
        if (event.key === " ") {
          event.preventDefault(); // empêche la page de défiler

          // Si la touche est juste MAINTENUE, le navigateur renvoie keydown en
          // rafale : on ignore ces répétitions pour n'avoir qu'UN missile par appui
          if (event.repeat) return;

          // La pointe du triangle est à RAYON_VAISSEAU devant le centre du vaisseau
          const x = etat.x + Math.cos(etat.angle) * RAYON_VAISSEAU;
          const y = etat.y + Math.sin(etat.angle) * RAYON_VAISSEAU;

          // Le missile part tout droit dans la direction où le vaisseau pointe
          etat.missiles.push({
            x: x,
            y: y,
            vitesseX: Math.cos(etat.angle) * VITESSE_MISSILE,
            vitesseY: Math.sin(etat.angle) * VITESSE_MISSILE,
          });
        }
      });

      // Quand on RELÂCHE une flèche
      document.addEventListener("keyup", function (event) {
        if (event.key === "ArrowUp") etat.touches.haut = false;
        if (event.key === "ArrowDown") etat.touches.bas = false;
        if (event.key === "ArrowLeft") etat.touches.gauche = false;
        if (event.key === "ArrowRight") etat.touches.droite = false;
      });

      // Quand la page perd le focus (on clique ailleurs) : on relâche tout
      window.addEventListener("blur", function () {
        etat.touches.haut = false;
        etat.touches.bas = false;
        etat.touches.gauche = false;
        etat.touches.droite = false;
      });

      // Fabrique un nouvel astéroïde et l'ajoute à la liste
      function creerAsteroide() {
        // Si on a déjà atteint le maximum d'astéroïdes, on ne fait rien
        if (etat.asteroides.length >= MAX_AST) return;

        // Il apparaît sur un bord au hasard de la map
        let x, y;
        if (Math.random() < 0.5) {
          // sur un bord vertical (gauche ou droite), HORS écran
          x = Math.random() < 0.5 ? -RAYON_AST : LARGEUR + RAYON_AST;
          y = Math.random() * HAUTEUR;
        } else {
          // sur un bord horizontal (haut ou bas), HORS écran
          x = Math.random() * LARGEUR;
          y = Math.random() < 0.5 ? -RAYON_AST : HAUTEUR + RAYON_AST;
        }

        // Direction au hasard mais VERS l'intérieur de la map :
        // on vise un point au hasard vers le centre, et on calcule l'angle
        // qui va de l'astéroïde vers ce point.
        const cibleX = 200 + Math.random() * 600; // entre 200 et 800
        const cibleY = 200 + Math.random() * 600; // entre 200 et 800
        const angle = Math.atan2(cibleY - y, cibleX - x);

        // On fabrique une forme irrégulière (pas un rond parfait) :
        // ~10 points autour du centre, chacun avec un rayon un peu au hasard
        const points = [];
        const nbPoints = 10;
        for (let i = 0; i < nbPoints; i++) {
          const a = (i / nbPoints) * Math.PI * 2; // angle de ce sommet
          const r = RAYON_AST * (0.7 + Math.random() * 0.6); // rayon cabossé
          points.push({ dx: Math.cos(a) * r, dy: Math.sin(a) * r });
        }

        etat.asteroides.push({
          x: x,
          y: y,
          vitesseX: Math.cos(angle) * VITESSE_AST,
          vitesseY: Math.sin(angle) * VITESSE_AST,
          rayon: RAYON_AST,
          points: points,
        });
      }

      // Toutes les 4 secondes, on essaie de créer un astéroïde
      setInterval(creerAsteroide, INTERVALLE_AST);

      function rendu() {
        // Effacer tout l'écran
        ctx.clearRect(0, 0, LARGEUR, HAUTEUR);

        // Est-ce que le vaisseau est invincible en ce moment ?
        const invincible = Date.now() < etat.invincibleJusqua;
        // Pendant l'invincibilité, on clignote : on n'affiche le vaisseau qu'une
        // tranche de temps sur deux (les tranches paires). Sinon, on l'affiche toujours.
        const afficherVaisseau =
          !invincible || Math.floor(Date.now() / CLIGNOTEMENT) % 2 === 0;

        // Dessiner le vaisseau (un triangle vert)
        if (afficherVaisseau) {
          ctx.fillStyle = "green";
          ctx.save(); // on met de côté le repère normal
          ctx.translate(etat.x, etat.y); // on se place sur le vaisseau
          ctx.rotate(etat.angle); // on tourne selon l'angle
          ctx.beginPath();
          ctx.moveTo(RAYON_VAISSEAU, 0); // la pointe (vers l'avant)
          ctx.lineTo(-10, -10); // coin arrière gauche
          ctx.lineTo(-10, 10); // coin arrière droit
          ctx.closePath();
          ctx.fill();
          ctx.restore(); // on remet le repère normal
        }

        // Dessiner les missiles (petites boules blanches)
        ctx.fillStyle = "white";
        for (const missile of etat.missiles) {
          ctx.beginPath();
          ctx.arc(missile.x, missile.y, RAYON_MISSILE, 0, Math.PI * 2);
          ctx.fill();
        }

        // Dessiner les astéroïdes (contour vert, intérieur noir, forme cabossée)
        for (const ast of etat.asteroides) {
          ctx.save();
          ctx.translate(ast.x, ast.y); // on se place sur l'astéroïde
          ctx.beginPath();
          ctx.moveTo(ast.points[0].dx, ast.points[0].dy);
          for (let i = 1; i < ast.points.length; i++) {
            ctx.lineTo(ast.points[i].dx, ast.points[i].dy);
          }
          ctx.closePath();
          ctx.fillStyle = "black"; // intérieur noir
          ctx.fill();
          ctx.strokeStyle = "green"; // contour vert
          ctx.lineWidth = 4;
          ctx.stroke();
          ctx.restore();
        }

        // Dessiner les explosions (cercle qui grandit et s'estompe)
        for (const explosion of etat.explosions) {
          ctx.globalAlpha = explosion.vie / 20; // de plus en plus transparent
          ctx.beginPath();
          ctx.arc(explosion.x, explosion.y, explosion.rayon, 0, Math.PI * 2);
          ctx.strokeStyle = "orange";
          ctx.stroke();
          ctx.globalAlpha = 1; // on remet l'opacité normale
        }

        // Dessiner le score (en haut à droite, en vert)
        ctx.fillStyle = "green";
        ctx.font = "24px sans-serif";
        ctx.textAlign = "right"; // le texte s'aligne sur le bord droit
        ctx.fillText("Score : " + etat.score, LARGEUR - 20, 40);
        ctx.textAlign = "left"; // on remet l'alignement normal pour la suite

        // Dessiner les cœurs (en haut à gauche, en rouge)
        ctx.fillStyle = "red";
        for (let i = 0; i < etat.vies; i++) {
          ctx.fillText("❤", 20 + i * 30, 40); // un cœur tous les 30 px
        }

        // Si la partie est finie : message au centre
        if (etat.partieFinie) {
          ctx.fillStyle = "white";
          ctx.font = "60px sans-serif";
          ctx.textAlign = "center";
          ctx.fillText("Partie terminée", LARGEUR / 2, 450);
          ctx.textAlign = "left"; // on remet l'alignement normal
        }
      }

      // Déplacer le vaisseau : rotation, accélération, freinage, inertie.
      function deplacerVaisseau() {
        // Tourner avec gauche / droite
        if (etat.touches.gauche) etat.angle -= ROTATION;
        if (etat.touches.droite) etat.angle += ROTATION;

        // Accélérer dans la direction où le vaisseau pointe
        if (etat.touches.haut) {
          etat.vitesseX += Math.cos(etat.angle) * ACCELERATION;
          etat.vitesseY += Math.sin(etat.angle) * ACCELERATION;
        }

        // Freiner avec la flèche du bas
        if (etat.touches.bas) {
          etat.vitesseX *= FREINAGE;
          etat.vitesseY *= FREINAGE;
        }

        // Ne pas dépasser la vitesse maximum
        const vitesse = Math.sqrt(etat.vitesseX ** 2 + etat.vitesseY ** 2);
        if (vitesse > VITESSE_MAX) {
          etat.vitesseX = (etat.vitesseX / vitesse) * VITESSE_MAX;
          etat.vitesseY = (etat.vitesseY / vitesse) * VITESSE_MAX;
        }

        // Frottement (ralentit tout seul)
        etat.vitesseX *= FROTTEMENT;
        etat.vitesseY *= FROTTEMENT;

        // Inertie (on bouge selon la vitesse)
        etat.x += etat.vitesseX;
        etat.y += etat.vitesseY;

        // Faire revenir le vaisseau de l'autre côté
        if (etat.x > LARGEUR) etat.x = 0;
        if (etat.x < 0) etat.x = LARGEUR;
        if (etat.y > HAUTEUR) etat.y = 0;
        if (etat.y < 0) etat.y = HAUTEUR;
      }

      // Déplacer les missiles, et retirer ceux sortis de la map.
      function deplacerMissiles() {
        for (const missile of etat.missiles) {
          missile.x += missile.vitesseX;
          missile.y += missile.vitesseY;
        }

        etat.missiles = etat.missiles.filter(function (missile) {
          return (
            missile.x >= 0 &&
            missile.x <= LARGEUR &&
            missile.y >= 0 &&
            missile.y <= HAUTEUR
          );
        });
      }

      // Déplacer les astéroïdes, et retirer ceux sortis de la map.
      // (avec une marge égale au rayon, pour ne pas les couper pile au bord)
      function deplacerAsteroides() {
        for (const ast of etat.asteroides) {
          ast.x += ast.vitesseX;
          ast.y += ast.vitesseY;
        }

        etat.asteroides = etat.asteroides.filter(function (ast) {
          return (
            ast.x >= -ast.rayon &&
            ast.x <= LARGEUR + ast.rayon &&
            ast.y >= -ast.rayon &&
            ast.y <= HAUTEUR + ast.rayon
          );
        });
      }

      // Le vaisseau touche-t-il un astéroïde ? Si oui : on perd un cœur.
      // (on ne teste pas si on est déjà invincible après un choc récent)
      function gererCollisionVaisseau() {
        if (Date.now() < etat.invincibleJusqua) return;

        for (const ast of etat.asteroides) {
          const d = distance(etat.x, etat.y, ast.x, ast.y);

          // le vaisseau fait son rayon, l'astéroïde a le sien
          if (d < ast.rayon + RAYON_VAISSEAU) {
            etat.vies -= 1; // on perd un cœur

            // On remet le vaisseau au centre, à l'arrêt
            etat.x = LARGEUR / 2;
            etat.y = HAUTEUR / 2;
            etat.vitesseX = 0;
            etat.vitesseY = 0;

            // On devient invincible pendant 2 secondes pour se replacer
            etat.invincibleJusqua = Date.now() + INVINCIBLE_DUREE;

            // Plus de cœurs : la partie est finie
            if (etat.vies <= 0) {
              etat.partieFinie = true;
              document.getElementById("rejouer").style.display = "block";
            }

            break; // un seul choc à la fois, on arrête de tester les astéroïdes
          }
        }
      }

      // Un missile touche-t-il un astéroïde ? Si oui : explosion, score, cœurs.
      function gererTirs() {
        for (const missile of etat.missiles) {
          for (const ast of etat.asteroides) {
            const d = distance(missile.x, missile.y, ast.x, ast.y);

            if (d < ast.rayon) {
              // Touché ! On marque les deux pour les retirer
              missile.touche = true;
              ast.touche = true;

              // On déclenche une explosion à la position de l'astéroïde
              etat.explosions.push({
                x: ast.x,
                y: ast.y,
                rayon: 5,
                vie: 20,
              });

              // Le score augmente de 10 pour chaque astéroïde cassé
              etat.score += 10;

              // Tous les 100 points : on gagne un cœur (mais 3 maximum)
              // On utilise un while au cas où on franchit plusieurs paliers d'un coup
              while (etat.score >= etat.prochainCoeur) {
                if (etat.vies < 3) etat.vies += 1; // sinon (déjà 3) : on n'ajoute rien
                etat.prochainCoeur += 100; // on passe au palier suivant
              }
            }
          }
        }

        // On retire les missiles et astéroïdes qui ont été touchés
        etat.missiles = etat.missiles.filter(function (missile) {
          return !missile.touche;
        });
        etat.asteroides = etat.asteroides.filter(function (ast) {
          return !ast.touche;
        });
      }

      // Faire vivre les explosions : elles grandissent puis disparaissent.
      function animerExplosions() {
        for (const explosion of etat.explosions) {
          explosion.rayon += 2; // le cercle grandit
          explosion.vie -= 1; // et se rapproche de la fin
        }

        etat.explosions = etat.explosions.filter(function (explosion) {
          return explosion.vie > 0;
        });
      }

      // La boucle du jeu : à lire de haut en bas, ça résume tout le jeu.
      function boucle() {
        deplacerVaisseau();
        deplacerMissiles();
        deplacerAsteroides();
        gererCollisionVaisseau();
        gererTirs();
        animerExplosions();
        rendu();

        // Si la partie est finie, on ne relance pas la boucle : le jeu se fige
        if (etat.partieFinie) return;

        // Recommencer la boucle
        requestAnimationFrame(boucle);
      }

      // Relancer une nouvelle partie : on remet tout l'état à zéro
      function rejouer() {
        etat = etatInitial();

        // On cache le bouton et on relance la boucle
        document.getElementById("rejouer").style.display = "none";
        boucle();
      }

      // Quand on clique sur le bouton Rejouer
      document.getElementById("rejouer").addEventListener("click", rejouer);

      // Lancer la boucle
      boucle();
    </script>
  </body>
</html>
