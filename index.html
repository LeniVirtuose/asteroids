<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Mon vaisseau</title>

    <style>
      body {
        margin: 0;
        overflow: hidden; /* pas de barres de défilement */
      }
      canvas {
        display: block; /* colle le canvas en haut à gauche, sans espace autour */
        background: black;
      }
      /* Le bouton Rejouer : caché au départ, posé par-dessus le canvas, au centre */
      #rejouer {
        display: none; /* invisible tant que la partie tourne */
        position: absolute;
        top: 60%;
        left: 50%;
        transform: translate(-50%, -50%);
        padding: 15px 30px;
        font-size: 24px;
        cursor: pointer;
      }
      /* Le bouton Pause : en haut à droite, juste sous le score.
         Il affiche deux barres parallèles (icône pause), ou un triangle
         "lecture" quand le jeu est en pause (classe .lecture). */
      #pause {
        position: absolute;
        top: 95px; /* bien en dessous du score */
        right: 40px;
        width: 60px;
        height: 50px;
        padding: 0;
        cursor: pointer;
        background: transparent; /* bouton transparent */
        border: none;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 9px;
      }
      /* les deux barres parallèles (en blanc pour être visibles sur le fond noir) */
      #pause::before,
      #pause::after {
        content: "";
        width: 9px;
        height: 28px;
        background: white;
      }
      /* en pause : un triangle "lecture" à la place des deux barres */
      #pause.lecture::before {
        width: 0;
        height: 0;
        border-style: solid;
        border-width: 14px 0 14px 24px;
        border-color: transparent transparent transparent white;
      }
      #pause.lecture::after {
        display: none;
      }
      /* Le bouton qui ouvre le menu des améliorations : en bas au centre */
      #boutique {
        position: absolute;
        bottom: 12px;
        left: 50%;
        transform: translateX(-50%);
        padding: 18px 38px;
        font-size: 26px;
        cursor: pointer;
      }
      /* Le menu des améliorations : voile plein écran, caché par défaut */
      #ameliorations {
        display: none; /* devient "flex" quand on l'ouvre (classe .ouvert) */
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.85);
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: white;
        font-family: sans-serif;
      }
      #ameliorations.ouvert {
        display: flex;
      }
      #ameliorations h2 {
        font-size: 48px;
        margin: 0 0 10px;
      }
      #boutique-pieces {
        font-size: 28px;
        color: gold;
        margin: 0;
      }
      #boutique-liste {
        display: flex;
        flex-direction: column;
        gap: 18px;
        margin: 34px 0;
      }
      /* amélioration ACHETABLE : bien claire (fond blanc) */
      #boutique-liste button {
        min-width: 420px;
        padding: 20px 32px;
        font-size: 24px;
        cursor: pointer;
        background: white;
        color: black;
        border: 2px solid white;
        border-radius: 10px;
      }
      /* amélioration trop chère (ou impossible) : grisée et non cliquable */
      #boutique-liste button:disabled {
        opacity: 0.35;
        cursor: default;
      }
      #fermer-boutique {
        padding: 16px 40px;
        font-size: 24px;
        cursor: pointer;
        border-radius: 10px;
      }
    </style>
  </head>
  <body>
    <canvas id="monCanvas"></canvas>
    <button id="rejouer">Rejouer</button>
    <button id="pause" aria-label="Pause"></button>
    <button id="boutique">Améliorations</button>

    <!-- Le menu des améliorations (rempli par le JavaScript) -->
    <div id="ameliorations">
      <h2>Améliorations</h2>
      <p id="boutique-pieces">Pièces : 0</p>
      <div id="boutique-liste"></div>
      <button id="fermer-boutique">Fermer</button>
    </div>

    <script>
      const canvas = document.getElementById("monCanvas");
      const ctx = canvas.getContext("2d");

      // ZOOM : à quel point on grossit tout le jeu. Mets 2 pour x2 plus gros,
      // 3 pour x3, etc. C'est LE chiffre à changer si tout te paraît trop petit
      // ou trop gros. (1 = taille d'origine, où le terrain faisait 1000 px.)
      const ZOOM = 2;

      // Taille du terrain de jeu en pixels LOGIQUES (ceux qu'on utilise pour
      // dessiner). Comme on zoome, le terrain logique est plus petit que l'écran
      // (ex : écran 1920 px, ZOOM 2 -> terrain logique de 960). Les objets, eux,
      // gardent leur taille (15, 40...) donc ils paraissent ZOOM fois plus gros.
      // "let" car ces valeurs changent au redimensionnement (voir configurerCanvas).
      let LARGEUR = window.innerWidth / ZOOM;
      let HAUTEUR = window.innerHeight / ZOOM;

      // Adapte le canvas à la fenêtre, au ZOOM, ET à la finesse de l'écran.
      // Un écran mobile a souvent 2 ou 3 VRAIS pixels pour 1 pixel logique :
      // c'est le "device pixel ratio" (DPR). Sans en tenir compte, tout est flou.
      function configurerCanvas() {
        LARGEUR = window.innerWidth / ZOOM;
        HAUTEUR = window.innerHeight / ZOOM;

        // Combien de vrais pixels pour 1 pixel logique (1 sur un écran normal,
        // 2 ou 3 sur beaucoup de mobiles). On limite à 3 pour ne pas trop charger.
        const dpr = Math.min(window.devicePixelRatio || 1, 3);

        // Le canvas occupe toute la fenêtre à l'écran (taille en CSS)...
        canvas.style.width = window.innerWidth + "px";
        canvas.style.height = window.innerHeight + "px";

        // ...mais on lui donne DPR fois plus de vrais pixels dessous (netteté).
        canvas.width = Math.round(window.innerWidth * dpr);
        canvas.height = Math.round(window.innerHeight * dpr);

        // On combine le ZOOM et le DPR en UNE SEULE échelle, appliquée ici une
        // fois pour toutes : le contexte multiplie ensuite tout seul chaque
        // coordonnée. Du coup on continue à dessiner avec LARGEUR/HAUTEUR sans
        // rien multiplier à la main. setTransform remet le repère à zéro avant
        // (utile car changer canvas.width réinitialise le contexte).
        const echelle = ZOOM * dpr;
        ctx.setTransform(echelle, 0, 0, echelle, 0, 0);
      }

      // On configure tout de suite, puis à chaque changement de taille de fenêtre
      configurerCanvas();
      window.addEventListener("resize", configurerCanvas);

      // Réglages du vaisseau (change ces nombres pour tester !)
      const RAYON_VAISSEAU = 15; // taille du vaisseau (du centre à la pointe)
      const ACCELERATION = 0.5; // poussée des flèches (plus grand = plus nerveux)
      const VITESSE_MAX = 8; // vitesse maximum
      const FROTTEMENT = 0.9; // ralentit tout seul quand on lâche les flèches
      const SENSIBILITE_DOIGT = 0.8; // sur mobile : le perso bouge X fois plus que le doigt
      const PV_MAX = 60; // points de vie du personnage au départ

      // Réglages des missiles
      const VITESSE_MISSILE = 10; // vitesse des boules
      const RAYON_MISSILE = 4; // taille des boules
      const DEGATS_MISSILE = 10; // points de vie enlevés à l'ennemi touché

      // Réglages des vaisseaux qui tournent autour du personnage
      const RAYON_ORBITE = 60; // distance entre le personnage et ses vaisseaux
      const VITESSE_ORBITE = 0.03; // vitesse de rotation autour (radians par image)
      const TAILLE_VAISSEAU = 10; // taille des petits vaisseaux
      const INTERVALLE_TIR = 500; // un tir toutes les 500 ms par vaisseau
      const MAX_VAISSEAUX = 5; // au-delà, on ne peut plus en ajouter : il faut fusionner
      // Couleur des vaisseaux selon le nombre de merges (0 = cyan, 1 = rouge, ...)
      const COULEURS_VAISSEAU = [
        "cyan",
        "red",
        "lime",
        "yellow",
        "magenta",
        "orange",
        "white",
      ];

      // Réglages des astéroïdes
      const RAYON_AST = 40; // taille (bien plus gros que le vaisseau)
      const VITESSE_AST = 1; // vitesse faible
      const PV_AST = 10; // points de vie de l'astéroïde (meurt en 1 missile)
      const DEGATS_AST = 10; // dégâts de base (augmentent avec les vagues)
      const POINTS_AST = 10; // points de score gagnés quand on le détruit

      // Réglages des aliens (plus petits et plus rapides que les astéroïdes)
      const RAYON_ALIEN = 25; // taille de l'alien
      const VITESSE_ALIEN = 1.4; // un peu plus rapide que l'astéroïde
      const PV_ALIEN = 20; // points de vie de l'alien (meurt en 2 missiles)
      const DEGATS_ALIEN = 15; // dégâts de base (augmentent avec les vagues)
      const POINTS_ALIEN = 15; // points de score gagnés quand on le détruit

      // Réglages des tirs d'aliens
      const VITESSE_TIR_ALIEN = 4; // vitesse du tir
      const RAYON_TIR_ALIEN = 5; // taille du tir
      const INTERVALLE_TIR_ALIEN = 2000; // chaque alien tire toutes les 2 secondes

      // Réglages des vagues
      const INTERVALLE_SPAWN = 550; // temps entre 2 apparitions d'ennemis (ms)
      const BOSS_TOUTES_LES = 10; // grosse vague toutes les 10 vagues
      const BOSS_FACTEUR = 2; // 2x plus d'ennemis sur une grosse vague
      const VAGUE_ALIENS = 5; // les aliens apparaissent à partir de cette vague
      const FORCE_FACTEUR = 1.2; // dégâts des ennemis x1.2 toutes les 5 vagues
      // PV des ennemis : croissance GÉOMÉTRIQUE (comme la puissance du joueur qui
      // monte vite avec les fusions/upgrades), sinon le jeu devient trop facile.
      const PV_FACTEUR = 1.25; // PV x1.25 toutes les 5 vagues (jusqu'à VAGUE_DIFFICILE)
      const VAGUE_DIFFICILE = 20; // au-delà, la difficulté accélère un peu
      const PV_FACTEUR_DUR = 1.4; // après VAGUE_DIFFICILE : PV x1.4 toutes les 5 vagues
      const VITESSE_FACTEUR_VAGUE = 0.03; // +3% de vitesse des ennemis toutes les 5 vagues
      const MAX_ENNEMIS_BASE = 9; // ennemis max à l'écran au départ
      const MAX_ENNEMIS_BONUS = 2; // +2 au max toutes les 10 vagues
      const MAX_ENNEMIS_BONUS_DUR = 2; // +2 de plus toutes les 10 vagues après VAGUE_DIFFICILE

      // Réglages du laser de bord (toutes les LASER_TOUTES_LES vagues) :
      // un voyant rouge prévient pendant LASER_ALERTE_MS, puis un laser traverse
      // la map sur une ligne horizontale et enlève LASER_DEGATS PV si on est dessus.
      const LASER_TOUTES_LES = 5; // un laser aux vagues multiples de 5 (5, 10, 15…)
      const LASER_ALERTE_MS = 1500; // durée du voyant d'avertissement (1.5 s pour réagir)
      const LASER_DUREE_MS = 1250; // durée de l'éclair quand le laser tire
      const LASER_DEGATS = 100; // PV enlevés si on est sur la trajectoire
      const LASER_EPAISSEUR = 30; // épaisseur du trait rouge (sert aussi à la collision)
      const COULEUR_LASER = "red"; // couleur du laser et du voyant

      // Réglages des pièces (lâchées par les ennemis tués). Plus un ennemi est
      // fort, plus il lâche de pièces : l'alien (plus fort) en donne plus, et le
      // montant grimpe avec la force des ennemis (facteurForce, monte par vagues).
      const PIECES_AST = 6; // pièces de base d'un astéroïde
      const PIECES_ALIEN = 10; // pièces de base d'un alien (plus fort)
      const RAYON_PIECE = 8; // taille d'une pièce posée au sol
      const PORTEE_AIMANT = 150; // distance à laquelle les pièces sont attirées
      const VITESSE_AIMANT = 8; // vitesse à laquelle une pièce attirée se rapproche

      // Réglages de l'invincibilité (après un choc)
      const INVINCIBLE_DUREE = 2000; // durée d'invincibilité en ms (2 secondes)
      const CLIGNOTEMENT = 150; // vitesse du clignotement en ms (plus petit = clignote plus vite)

      // Fabrique un état neuf, comme au tout début d'une partie.
      // On l'écrit ICI une seule fois : utilisé au lancement ET dans rejouer().
      function etatInitial() {
        return {
          x: LARGEUR / 2,
          y: HAUTEUR / 2,
          angle: -Math.PI / 2, // le triangle pointe toujours vers le haut (ne tourne plus)
          vitesseX: 0, // de combien il glisse à gauche/droite
          vitesseY: 0, // de combien il glisse en haut/bas
          // quelles flèches sont enfoncées en ce moment
          touches: {
            haut: false,
            bas: false,
            gauche: false,
            droite: false,
          },
          // déplacement au doigt sur mobile : on ne suit PAS un point absolu.
          // doigtPrecedent = dernière position connue du doigt (null si pas de doigt),
          // glisseX/glisseY = de combien le doigt a glissé depuis la dernière image
          // (le personnage bouge d'autant, puis on remet à zéro)
          doigtPrecedent: null,
          glisseX: 0,
          glisseY: 0,
          // les vaisseaux qui tournent autour du personnage et tirent tout seuls.
          // Chacun a son angle (sa position sur le cercle) et l'heure de son prochain tir.
          // Au début : un seul, on pourra en ajouter avec les améliorations (étape 11).
          // chaque vaisseau a son propre niveau (0 = base) : il décide de sa
          // couleur et de sa puissance. Un vaisseau neuf est toujours au niveau 0.
          vaisseaux: [{ angle: 0, prochainTir: 0, niveau: 0 }],
          // stats des tirs des vaisseaux (améliorables dans la boutique)
          vitesseMissile: VITESSE_MISSILE, // vitesse des missiles
          degatsMissile: DEGATS_MISSILE, // dégâts de base (avant le bonus de niveau)
          // les listes d'objets qui apparaissent et disparaissent pendant le jeu
          missiles: [], // les petites boules tirées par les vaisseaux
          ennemis: [], // les astéroïdes ET les aliens qui foncent sur le personnage
          tirsAliens: [], // les tirs lancés par les aliens vers le personnage
          piecesAuSol: [], // les pièces tombées des ennemis, à ramasser
          explosions: [], // les petites animations quand un ennemi explose
          // les vagues : numéro de vague, et combien d'ennemis restent à faire
          // apparaître (préparés par demarrerVague au début de chaque vague)
          vague: 1,
          aSpawnerAst: 0,
          aSpawnerAlien: 0,
          prochainSpawn: 0,
          // le laser de bord : phase ("inactif" | "alerte" | "tir"), la hauteur y
          // de la ligne qu'il suit, l'heure de fin de la phase en cours, et un
          // repère pour n'enlever les PV qu'une fois par laser.
          laser: { phase: "inactif", y: 0, finPhase: 0, dejaTouche: false },
          // le score et les points de vie
          score: 0, // monte quand on tue un ennemi
          pieces: 0, // monnaie pour les améliorations (étape 11)
          prochainBonusPv: 150, // au prochain palier de score, on gagne +20 PV
          pv: PV_MAX, // points de vie actuels
          pvMax: PV_MAX, // points de vie maximum (augmentera avec les améliorations)
          invincibleJusqua: 0, // repère de temps : invincible tant qu'on n'a pas dépassé ce moment
          enPause: false, // le jeu est-il en pause ?
          pauseDebut: 0, // heure du début de la pause (pour recaler les minuteurs au retour)
          partieFinie: false, // devient vrai quand les PV tombent à 0
        };
      }

      // L'état de l'application
      let etat = etatInitial();

      // Le nom du joueur (demandé une fois au démarrage, étape 0). Il sert à
      // s'enregistrer dans le tableau des scores. On garde "Anonyme" par défaut.
      let nomJoueur = "Anonyme";

      // Vrai si le joueur vient de battre son record (pour l'afficher à la fin).
      let nouveauRecord = false;

      // Étape 6 : le tableau des meilleurs scores, sous forme
      // [ { nom: "Léa", score: 120 }, ... ]. On le garde en mémoire dans le
      // navigateur. localStorage ne stocke que du texte, donc on convertit
      // l'objet en texte avec JSON.stringify, et on le relit avec JSON.parse.
      // S'il n'y a encore rien d'enregistré, on part d'un tableau vide.
      let scores = JSON.parse(localStorage.getItem("scores")) || [];

      // Petite fonction pour enregistrer le tableau des scores dans le navigateur.
      function sauverScores() {
        localStorage.setItem("scores", JSON.stringify(scores));
      }

      // Le meilleur score = le premier du tableau (il est trié du plus grand au
      // plus petit). 0 s'il n'y a encore aucun score enregistré.
      function meilleurScore() {
        return scores.length > 0 ? scores[0].score : 0;
      }

      // Distance entre deux points (a et b). Sert à détecter les collisions.
      function distance(ax, ay, bx, by) {
        const dx = ax - bx;
        const dy = ay - by;
        return Math.sqrt(dx * dx + dy * dy);
      }

      // Quand on APPUIE sur une flèche (le personnage ne tire plus lui-même :
      // ce seront les vaisseaux qui tournent autour qui tireront, voir étape 3)
      document.addEventListener("keydown", function (event) {
        if (event.key === "ArrowUp") etat.touches.haut = true;
        if (event.key === "ArrowDown") etat.touches.bas = true;
        if (event.key === "ArrowLeft") etat.touches.gauche = true;
        if (event.key === "ArrowRight") etat.touches.droite = true;

        // Touche P ou Échap : mettre en pause / reprendre
        if (event.key === "p" || event.key === "Escape") basculerPause();

        // Touche Espace : ouvrir / fermer le menu des améliorations
        if (event.key === " " || event.code === "Space") {
          event.preventDefault(); // empêche la page de défiler
          if (etat.partieFinie) return;
          if (menuAmeliorations.classList.contains("ouvert")) {
            fermerBoutique();
          } else {
            ouvrirBoutique();
          }
        }
      });

      // Quand on RELÂCHE une flèche
      document.addEventListener("keyup", function (event) {
        if (event.key === "ArrowUp") etat.touches.haut = false;
        if (event.key === "ArrowDown") etat.touches.bas = false;
        if (event.key === "ArrowLeft") etat.touches.gauche = false;
        if (event.key === "ArrowRight") etat.touches.droite = false;
      });

      // Quand la page perd le focus (on clique ailleurs) : on relâche tout
      window.addEventListener("blur", function () {
        etat.touches.haut = false;
        etat.touches.bas = false;
        etat.touches.gauche = false;
        etat.touches.droite = false;
      });

      // --- Déplacement au DOIGT (mobile) ---

      // Convertit une position du doigt (en pixels de l'écran) vers les
      // coordonnées du jeu. Comme on a zoomé le terrain de ZOOM, il suffit de
      // diviser par ZOOM (le canvas occupe tout l'écran, à partir du coin haut-gauche).
      function positionLogique(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: (clientX - rect.left) / ZOOM,
          y: (clientY - rect.top) / ZOOM,
        };
      }

      // Quand un doigt TOUCHE l'écran : on note juste où il se pose, sans bouger
      // le personnage. Il ne se déplacera que quand on GLISSE le doigt.
      function doigtPose(event) {
        event.preventDefault(); // empêche la page de défiler / zoomer
        const touch = event.touches[0]; // on suit le premier doigt
        etat.doigtPrecedent = positionLogique(touch.clientX, touch.clientY);
      }

      // Quand le doigt GLISSE : on mesure de combien il a bougé depuis la dernière
      // position, et on ajoute ce déplacement au personnage (mouvement relatif).
      function doigtGlisse(event) {
        event.preventDefault();
        const touch = event.touches[0];
        const position = positionLogique(touch.clientX, touch.clientY);
        if (etat.doigtPrecedent) {
          etat.glisseX += position.x - etat.doigtPrecedent.x;
          etat.glisseY += position.y - etat.doigtPrecedent.y;
        }
        etat.doigtPrecedent = position; // on retient la nouvelle position
      }

      // { passive: false } est nécessaire pour que preventDefault() marche sur touchmove
      canvas.addEventListener("touchstart", doigtPose, { passive: false });
      canvas.addEventListener("touchmove", doigtGlisse, { passive: false });

      // Quand on lève le doigt : on oublie sa position (plus de glissement)
      canvas.addEventListener("touchend", function () {
        etat.doigtPrecedent = null;
      });

      // Renvoie une position au hasard sur un bord de l'écran, juste en DEHORS.
      // "marge" = de combien on dépasse le bord (en général le rayon de l'ennemi).
      function positionBord(marge) {
        if (Math.random() < 0.5) {
          // sur un bord vertical (gauche ou droite)
          return {
            x: Math.random() < 0.5 ? -marge : LARGEUR + marge,
            y: Math.random() * HAUTEUR,
          };
        } else {
          // sur un bord horizontal (haut ou bas)
          return {
            x: Math.random() * LARGEUR,
            y: Math.random() < 0.5 ? -marge : HAUTEUR + marge,
          };
        }
      }

      // Fabrique un nouvel astéroïde qui FONCE vers le personnage.
      function creerAsteroide() {
        const depart = positionBord(RAYON_AST);

        // Les ennemis deviennent plus forts toutes les 5 vagues
        const degats = DEGATS_AST * facteurForce();

        // Direction : du point de départ DROIT vers le personnage (au moment où il apparaît)
        const angle = Math.atan2(etat.y - depart.y, etat.x - depart.x);

        // On fabrique une forme irrégulière (pas un rond parfait) :
        // ~10 points autour du centre, chacun avec un rayon un peu au hasard
        const points = [];
        const nbPoints = 10;
        for (let i = 0; i < nbPoints; i++) {
          const a = (i / nbPoints) * Math.PI * 2; // angle de ce sommet
          const r = RAYON_AST * (0.7 + Math.random() * 0.6); // rayon cabossé
          points.push({ dx: Math.cos(a) * r, dy: Math.sin(a) * r });
        }

        etat.ennemis.push({
          type: "asteroide",
          x: depart.x,
          y: depart.y,
          vitesseX: Math.cos(angle) * VITESSE_AST * facteurVitesse(),
          vitesseY: Math.sin(angle) * VITESSE_AST * facteurVitesse(),
          rayon: RAYON_AST,
          // PV : croissance géométrique avec les vagues (accélère après VAGUE_DIFFICILE)
          pv: Math.round(PV_AST * facteurPV()),
          degats: Math.round(degats), // dégâts au personnage (montent avec les vagues)
          valeur: POINTS_AST, // points de score gagnés en le détruisant
          pieces: Math.round(PIECES_AST * facteurForce()), // plus fort = plus de pièces
          points: points,
        });
      }

      // Fabrique un nouvel alien qui FONCE vers le personnage.
      function creerAlien() {
        const depart = positionBord(RAYON_ALIEN);
        const angle = Math.atan2(etat.y - depart.y, etat.x - depart.x);

        // Les ennemis deviennent plus forts toutes les 5 vagues
        const degats = DEGATS_ALIEN * facteurForce();

        etat.ennemis.push({
          type: "alien",
          x: depart.x,
          y: depart.y,
          vitesseX: Math.cos(angle) * VITESSE_ALIEN * facteurVitesse(),
          vitesseY: Math.sin(angle) * VITESSE_ALIEN * facteurVitesse(),
          rayon: RAYON_ALIEN,
          // PV : croissance géométrique avec les vagues (accélère après VAGUE_DIFFICILE)
          pv: Math.round(PV_ALIEN * facteurPV()),
          degats: Math.round(degats), // dégâts au personnage (montent avec les vagues)
          valeur: POINTS_ALIEN, // points de score gagnés en le détruisant
          pieces: Math.round(PIECES_ALIEN * facteurForce()), // plus fort = plus de pièces
          // l'heure de son prochain tir (on attend un peu avant le premier)
          prochainTir: Date.now() + INTERVALLE_TIR_ALIEN,
        });
      }

      // --- LES VAGUES ---

      // De combien les ennemis sont plus forts : x1.2 toutes les 5 vagues.
      function facteurForce() {
        return Math.pow(FORCE_FACTEUR, Math.floor(etat.vague / 5));
      }

      // Multiplicateur de PV des ennemis : croissance géométrique par paliers de 5
      // vagues. Avant VAGUE_DIFFICILE : x1.35 par palier. Après : x1.7 par palier,
      // pour que ça ne devienne pas trop facile une fois le joueur bien équipé.
      function facteurPV() {
        const paliers = Math.floor(etat.vague / 5);
        const paliersDouble = Math.floor(VAGUE_DIFFICILE / 5);
        if (paliers <= paliersDouble) {
          return Math.pow(PV_FACTEUR, paliers);
        }
        return (
          Math.pow(PV_FACTEUR, paliersDouble) *
          Math.pow(PV_FACTEUR_DUR, paliers - paliersDouble)
        );
      }

      // Les ennemis vont aussi de plus en plus vite : +5% toutes les 5 vagues.
      function facteurVitesse() {
        return 1 + VITESSE_FACTEUR_VAGUE * Math.floor(etat.vague / 5);
      }

      // Nombre maximum d'ennemis à l'écran en même temps : +2 toutes les 10 vagues,
      // et +3 supplémentaires toutes les 10 vagues une fois VAGUE_DIFFICILE passée.
      function maxEnnemis() {
        const palier10 = Math.floor(etat.vague / 10);
        const palier10Dur = Math.max(
          0,
          palier10 - Math.floor(VAGUE_DIFFICILE / 10),
        );
        return (
          MAX_ENNEMIS_BASE +
          MAX_ENNEMIS_BONUS * palier10 +
          MAX_ENNEMIS_BONUS_DUR * palier10Dur
        );
      }

      // Prépare la vague en cours : décide combien d'astéroïdes et d'aliens
      // vont apparaître, puis ils sortiront un par un (toutes les INTERVALLE_SPAWN ms).
      function demarrerVague() {
        const v = etat.vague;

        // Toutes les BOSS_TOUTES_LES vagues : grosse vague (beaucoup plus d'ennemis)
        const estBoss = v % BOSS_TOUTES_LES === 0;
        const facteur = estBoss ? BOSS_FACTEUR : 1;

        // Nombre total d'ennemis : 4 au départ, +3 toutes les 5 vagues
        // (et x2 sur une grosse vague).
        const total = (4 + 3 * Math.floor(v / 5)) * facteur;

        // Les aliens n'apparaissent qu'à partir de la vague VAGUE_ALIENS.
        // Quand ils apparaissent, environ un tiers du groupe sont des aliens.
        if (v >= VAGUE_ALIENS) {
          etat.aSpawnerAlien = Math.floor(total / 3);
          etat.aSpawnerAst = total - etat.aSpawnerAlien;
        } else {
          etat.aSpawnerAlien = 0;
          etat.aSpawnerAst = total;
        }
        etat.prochainSpawn = Date.now() + INTERVALLE_SPAWN;

        // Toutes les LASER_TOUTES_LES vagues : on déclenche l'avertissement du laser.
        // On choisit une ligne horizontale au hasard, puis le voyant clignote
        // pendant LASER_ALERTE_MS avant que le laser ne tire (voir gererLaser).
        if (v % LASER_TOUTES_LES === 0) {
          etat.laser.phase = "alerte";
          etat.laser.y = Math.random() * HAUTEUR;
          etat.laser.finPhase = Date.now() + LASER_ALERTE_MS;
          etat.laser.dejaTouche = false;
        }
      }

      // Fait avancer le laser dans le temps : alerte -> tir -> inactif. Pendant le
      // tir, si le personnage est sur la ligne, il perd LASER_DEGATS PV (une fois).
      function gererLaser() {
        const maintenant = Date.now();
        const laser = etat.laser;
        if (laser.phase === "inactif") return;

        if (laser.phase === "alerte") {
          // Fin de l'avertissement : le laser tire maintenant.
          if (maintenant >= laser.finPhase) {
            laser.phase = "tir";
            laser.finPhase = maintenant + LASER_DUREE_MS;
          }
          return;
        }

        if (laser.phase === "tir") {
          // Le personnage est-il sur la ligne du laser ? (une seule fois par laser)
          if (
            !laser.dejaTouche &&
            Math.abs(etat.y - laser.y) < LASER_EPAISSEUR / 2 + RAYON_VAISSEAU
          ) {
            laser.dejaTouche = true;
            subirChoc(LASER_DEGATS);
          }
          // Fin de l'éclair : le laser disparaît.
          if (maintenant >= laser.finPhase) {
            laser.phase = "inactif";
          }
        }
      }

      // Appelée à chaque image : fait apparaître les ennemis de la vague petit à
      // petit, puis passe à la vague suivante quand l'écran est vide.
      function gererVagues() {
        const maintenant = Date.now();

        // Reste-t-il des ennemis à faire apparaître pour cette vague ?
        if (etat.aSpawnerAst > 0 || etat.aSpawnerAlien > 0) {
          // ... mais seulement si on n'a pas atteint le maximum à l'écran
          if (
            maintenant >= etat.prochainSpawn &&
            etat.ennemis.length < maxEnnemis()
          ) {
            // On sort un alien de temps en temps, sinon un astéroïde
            if (etat.aSpawnerAlien > 0 && Math.random() < 0.4) {
              creerAlien();
              etat.aSpawnerAlien -= 1;
            } else if (etat.aSpawnerAst > 0) {
              creerAsteroide();
              etat.aSpawnerAst -= 1;
            } else {
              creerAlien();
              etat.aSpawnerAlien -= 1;
            }
            etat.prochainSpawn = maintenant + INTERVALLE_SPAWN;
          }
          return;
        }

        // Tout est sorti : la vague est finie quand il n'y a plus aucun ennemi
        if (etat.ennemis.length === 0) {
          etat.vague += 1;
          demarrerVague();
        }
      }

      function rendu() {
        // Effacer tout l'écran
        ctx.clearRect(0, 0, LARGEUR, HAUTEUR);

        // Est-ce que le vaisseau est invincible en ce moment ?
        const invincible = Date.now() < etat.invincibleJusqua;
        // Pendant l'invincibilité, on clignote : on n'affiche le vaisseau qu'une
        // tranche de temps sur deux (les tranches paires). Sinon, on l'affiche toujours.
        const afficherVaisseau =
          !invincible || Math.floor(Date.now() / CLIGNOTEMENT) % 2 === 0;

        // Dessiner le vaisseau (un triangle vert)
        if (afficherVaisseau) {
          ctx.fillStyle = "green";
          ctx.save(); // on met de côté le repère normal
          ctx.translate(etat.x, etat.y); // on se place sur le vaisseau
          ctx.rotate(etat.angle); // on tourne selon l'angle
          ctx.beginPath();
          ctx.moveTo(RAYON_VAISSEAU, 0); // la pointe (vers l'avant)
          ctx.lineTo(-10, -10); // coin arrière gauche
          ctx.lineTo(-10, 10); // coin arrière droit
          ctx.closePath();
          ctx.fill();
          ctx.restore(); // on remet le repère normal
        }

        // Barre de vie au-dessus du personnage, en rouge, avec le nombre de PV écrit dessus
        const largeurBarre = 50;
        const hauteurBarre = 14;
        const barreX = etat.x - largeurBarre / 2;
        const barreY = etat.y - RAYON_VAISSEAU - 22;
        const ratioPv = Math.max(0, etat.pv / etat.pvMax); // jamais en dessous de 0
        // fond sombre (la partie déjà perdue)
        ctx.fillStyle = "#400";
        ctx.fillRect(barreX, barreY, largeurBarre, hauteurBarre);
        // vie restante, en rouge
        ctx.fillStyle = "red";
        ctx.fillRect(barreX, barreY, largeurBarre * ratioPv, hauteurBarre);
        // le nombre de PV écrit au centre de la barre, en blanc
        ctx.fillStyle = "white";
        ctx.font = "10px sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(Math.round(etat.pv), etat.x, barreY + hauteurBarre / 2);
        ctx.textAlign = "left"; // on remet l'alignement normal
        ctx.textBaseline = "alphabetic"; // on remet la position verticale normale

        // Dessiner les vaisseaux qui tournent autour (couleur selon LEUR niveau)
        for (const v of etat.vaisseaux) {
          ctx.fillStyle =
            COULEURS_VAISSEAU[Math.min(v.niveau, COULEURS_VAISSEAU.length - 1)];
          const vx = etat.x + Math.cos(v.angle) * RAYON_ORBITE;
          const vy = etat.y + Math.sin(v.angle) * RAYON_ORBITE;
          ctx.save();
          ctx.translate(vx, vy); // on se place sur le vaisseau
          ctx.rotate(v.angle); // il pointe vers l'extérieur du cercle
          ctx.beginPath();
          ctx.moveTo(TAILLE_VAISSEAU, 0); // la pointe
          ctx.lineTo(-6, -6);
          ctx.lineTo(-6, 6);
          ctx.closePath();
          ctx.fill();
          ctx.restore();
        }

        // Dessiner les missiles (petites boules blanches)
        ctx.fillStyle = "white";
        for (const missile of etat.missiles) {
          ctx.beginPath();
          ctx.arc(missile.x, missile.y, RAYON_MISSILE, 0, Math.PI * 2);
          ctx.fill();
        }

        // Dessiner les tirs des aliens (petites boules rouges)
        ctx.fillStyle = "red";
        for (const t of etat.tirsAliens) {
          ctx.beginPath();
          ctx.arc(t.x, t.y, RAYON_TIR_ALIEN, 0, Math.PI * 2);
          ctx.fill();
        }

        // Dessiner les pièces au sol (petits ronds dorés)
        ctx.fillStyle = "gold";
        for (const p of etat.piecesAuSol) {
          ctx.beginPath();
          ctx.arc(p.x, p.y, RAYON_PIECE, 0, Math.PI * 2);
          ctx.fill();
        }

        // Dessiner les ennemis selon leur type
        for (const e of etat.ennemis) {
          ctx.save();
          ctx.translate(e.x, e.y); // on se place sur l'ennemi

          if (e.type === "asteroide") {
            // astéroïde : forme cabossée, intérieur noir, contour vert
            ctx.beginPath();
            ctx.moveTo(e.points[0].dx, e.points[0].dy);
            for (let i = 1; i < e.points.length; i++) {
              ctx.lineTo(e.points[i].dx, e.points[i].dy);
            }
            ctx.closePath();
            ctx.fillStyle = "black";
            ctx.fill();
            ctx.strokeStyle = "green";
            ctx.lineWidth = 4;
            ctx.stroke();
          } else {
            // alien : un rond violet avec un contour magenta
            ctx.beginPath();
            ctx.arc(0, 0, e.rayon, 0, Math.PI * 2);
            ctx.fillStyle = "purple";
            ctx.fill();
            ctx.strokeStyle = "magenta";
            ctx.lineWidth = 3;
            ctx.stroke();
          }

          // Le nombre de PV écrit au centre de l'ennemi, en blanc
          ctx.fillStyle = "white";
          ctx.font = "14px sans-serif";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(Math.round(e.pv), 0, 0);

          ctx.restore();
        }

        // Dessiner les explosions (cercle qui grandit et s'estompe)
        for (const explosion of etat.explosions) {
          ctx.globalAlpha = explosion.vie / 20; // de plus en plus transparent
          ctx.beginPath();
          ctx.arc(explosion.x, explosion.y, explosion.rayon, 0, Math.PI * 2);
          ctx.strokeStyle = "orange";
          ctx.stroke();
          ctx.globalAlpha = 1; // on remet l'opacité normale
        }

        // Dessiner le laser de bord selon sa phase
        if (etat.laser.phase === "alerte") {
          // Avertissement : une ligne fine clignotante + un voyant sur chaque bord
          const clignote = Math.floor(Date.now() / 150) % 2 === 0;
          if (clignote) {
            ctx.strokeStyle = COULEUR_LASER;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, etat.laser.y);
            ctx.lineTo(LARGEUR, etat.laser.y);
            ctx.stroke();
            // les deux voyants ronds sur les bords gauche et droit
            ctx.fillStyle = COULEUR_LASER;
            ctx.beginPath();
            ctx.arc(12, etat.laser.y, 8, 0, Math.PI * 2);
            ctx.arc(LARGEUR - 12, etat.laser.y, 8, 0, Math.PI * 2);
            ctx.fill();
          }
        } else if (etat.laser.phase === "tir") {
          // Le tir : un gros trait rouge avec une lueur plus large derrière
          ctx.fillStyle = "rgba(255, 0, 0, 0.3)";
          ctx.fillRect(
            0,
            etat.laser.y - LASER_EPAISSEUR,
            LARGEUR,
            LASER_EPAISSEUR * 2,
          );
          ctx.fillStyle = COULEUR_LASER;
          ctx.fillRect(
            0,
            etat.laser.y - LASER_EPAISSEUR / 2,
            LARGEUR,
            LASER_EPAISSEUR,
          );
        }

        // Dessiner le score (en haut à droite, en vert)
        ctx.fillStyle = "green";
        ctx.font = "24px sans-serif";
        ctx.textAlign = "right"; // le texte s'aligne sur le bord droit
        ctx.fillText("Score : " + etat.score, LARGEUR - 20, 40);
        ctx.textAlign = "left"; // on remet l'alignement normal pour la suite

        // Dessiner la vague (en haut à gauche, en vert)
        ctx.fillText("Vague " + etat.vague, 20, 40);

        // Dessiner les pièces (juste sous la vague, en doré)
        ctx.fillStyle = "gold";
        ctx.fillText("Pièces : " + etat.pieces, 20, 70);

        // Étape 3 : le meilleur score, en haut au milieu de la page,
        // en plus petit pour rester discret.
        ctx.fillStyle = "green";
        ctx.font = "16px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("Meilleur score : " + meilleurScore(), LARGEUR / 2, 30);
        ctx.textAlign = "left"; // on remet l'alignement normal pour la suite

        // Si la partie est finie : message au centre
        if (etat.partieFinie) {
          ctx.fillStyle = "white";
          ctx.font = "60px sans-serif";
          ctx.textAlign = "center";
          ctx.fillText("Partie terminée", LARGEUR / 2, HAUTEUR / 2 - 40);

          // Étape 4 : le score atteint pendant la partie, en dessous.
          ctx.font = "28px sans-serif";
          ctx.fillText("Score : " + etat.score, LARGEUR / 2, HAUTEUR / 2 + 20);

          // Si on vient de battre le record : un message spécial, en doré.
          if (nouveauRecord) {
            ctx.fillStyle = "gold";
            ctx.fillText("Nouveau record !", LARGEUR / 2, HAUTEUR / 2 + 110);
          }

          // Étape 8 : le tableau des 5 meilleurs scores, en dessous.
          ctx.fillStyle = "white";
          ctx.font = "22px sans-serif";
          ctx.fillText("Meilleurs scores", LARGEUR / 2, HAUTEUR / 2 + 150);
          ctx.font = "18px sans-serif";
          for (let i = 0; i < scores.length; i++) {
            // une ligne par score : "1. Léa — 120"
            const ligne =
              i + 1 + ". " + scores[i].nom + " — " + scores[i].score;
            ctx.fillText(ligne, LARGEUR / 2, HAUTEUR / 2 + 180 + i * 26);
          }

          ctx.textAlign = "left"; // on remet l'alignement normal
        }

        // Si le jeu est en pause : voile sombre + message au centre
        if (etat.enPause && !etat.partieFinie) {
          ctx.fillStyle = "rgba(0, 0, 0, 0.5)";
          ctx.fillRect(0, 0, LARGEUR, HAUTEUR);
          ctx.fillStyle = "white";
          ctx.font = "60px sans-serif";
          ctx.textAlign = "center";
          ctx.fillText("Pause", LARGEUR / 2, HAUTEUR / 2);
          ctx.textAlign = "left"; // on remet l'alignement normal
        }
      }

      // Déplacer le vaisseau : il glisse dans les 4 directions (plus de rotation).
      function deplacerVaisseau() {
        // Chaque flèche pousse directement dans sa direction
        if (etat.touches.haut) etat.vitesseY -= ACCELERATION; // vers le haut
        if (etat.touches.bas) etat.vitesseY += ACCELERATION; // vers le bas
        if (etat.touches.gauche) etat.vitesseX -= ACCELERATION; // vers la gauche
        if (etat.touches.droite) etat.vitesseX += ACCELERATION; // vers la droite

        // Ne pas dépasser la vitesse maximum (concerne les flèches du clavier)
        const vitesse = Math.sqrt(etat.vitesseX ** 2 + etat.vitesseY ** 2);
        if (vitesse > VITESSE_MAX) {
          etat.vitesseX = (etat.vitesseX / vitesse) * VITESSE_MAX;
          etat.vitesseY = (etat.vitesseY / vitesse) * VITESSE_MAX;
        }

        // Frottement (ralentit tout seul)
        etat.vitesseX *= FROTTEMENT;
        etat.vitesseY *= FROTTEMENT;

        // Inertie (on bouge selon la vitesse)
        etat.x += etat.vitesseX;
        etat.y += etat.vitesseY;

        // Sur mobile : on déplace le perso DIRECTEMENT de ce dont le doigt a glissé,
        // multiplié par SENSIBILITE_DOIGT. On le fait APRÈS la vitesse pour que ce
        // déplacement ne soit PAS plafonné par VITESSE_MAX (c'était ça le souci).
        if (etat.glisseX !== 0 || etat.glisseY !== 0) {
          etat.x += etat.glisseX * SENSIBILITE_DOIGT;
          etat.y += etat.glisseY * SENSIBILITE_DOIGT;
          etat.glisseX = 0; // on a consommé le glissement
          etat.glisseY = 0;
        }

        // Faire revenir le vaisseau de l'autre côté
        if (etat.x > LARGEUR) etat.x = 0;
        if (etat.x < 0) etat.x = LARGEUR;
        if (etat.y > HAUTEUR) etat.y = 0;
        if (etat.y < 0) etat.y = HAUTEUR;
      }

      // Déplacer les missiles, et retirer ceux sortis de la map.
      function deplacerMissiles() {
        for (const missile of etat.missiles) {
          missile.x += missile.vitesseX;
          missile.y += missile.vitesseY;
        }

        etat.missiles = etat.missiles.filter(function (missile) {
          return (
            missile.x >= 0 &&
            missile.x <= LARGEUR &&
            missile.y >= 0 &&
            missile.y <= HAUTEUR
          );
        });
      }

      // Déplacer les ennemis. Comme le joueur, ils réapparaissent de l'autre
      // côté de l'écran quand ils sortent (au lieu de disparaître).
      function deplacerEnnemis() {
        for (const e of etat.ennemis) {
          e.x += e.vitesseX;
          e.y += e.vitesseY;

          // réapparaître du côté opposé une fois complètement sorti
          if (e.x > LARGEUR + e.rayon) e.x = -e.rayon;
          if (e.x < -e.rayon) e.x = LARGEUR + e.rayon;
          if (e.y > HAUTEUR + e.rayon) e.y = -e.rayon;
          if (e.y < -e.rayon) e.y = HAUTEUR + e.rayon;
        }
      }

      // Déplacer les tirs des aliens, et retirer ceux sortis de l'écran
      // ou qui ont touché le personnage.
      function deplacerTirsAliens() {
        for (const t of etat.tirsAliens) {
          t.x += t.vitesseX;
          t.y += t.vitesseY;
        }

        etat.tirsAliens = etat.tirsAliens.filter(function (t) {
          return (
            !t.touche &&
            t.x >= 0 &&
            t.x <= LARGEUR &&
            t.y >= 0 &&
            t.y <= HAUTEUR
          );
        });
      }

      // Faire tourner les vaisseaux autour du personnage et tirer tout seuls.
      function gererVaisseaux() {
        const maintenant = Date.now();

        for (const v of etat.vaisseaux) {
          // Le vaisseau avance sur son cercle autour du personnage
          v.angle += VITESSE_ORBITE;

          // Sa position = personnage + un point sur le cercle (rayon RAYON_ORBITE)
          const vx = etat.x + Math.cos(v.angle) * RAYON_ORBITE;
          const vy = etat.y + Math.sin(v.angle) * RAYON_ORBITE;

          // Tir automatique à intervalle régulier (toutes les INTERVALLE_TIR ms),
          // vers l'extérieur du cercle (la direction où le vaisseau pointe).
          if (maintenant >= v.prochainTir) {
            etat.missiles.push({
              x: vx,
              y: vy,
              vitesseX: Math.cos(v.angle) * etat.vitesseMissile,
              vitesseY: Math.sin(v.angle) * etat.vitesseMissile,
              // dégâts : base globale x1.5 par niveau de merge de CE vaisseau
              degats: etat.degatsMissile * Math.pow(1.5, v.niveau),
            });

            // On programme le prochain tir
            v.prochainTir = maintenant + INTERVALLE_TIR;
          }
        }
      }

      // Chaque alien tire vers le personnage à intervalle régulier.
      function gererTirsAliens() {
        const maintenant = Date.now();

        for (const e of etat.ennemis) {
          if (e.type !== "alien") continue; // seuls les aliens tirent

          if (maintenant >= e.prochainTir) {
            // angle qui va de l'alien vers le personnage (sa position actuelle)
            const angle = Math.atan2(etat.y - e.y, etat.x - e.x);
            etat.tirsAliens.push({
              x: e.x,
              y: e.y,
              vitesseX: Math.cos(angle) * VITESSE_TIR_ALIEN,
              vitesseY: Math.sin(angle) * VITESSE_TIR_ALIEN,
              degats: DEGATS_ALIEN, // dégâts infligés s'il touche le personnage
            });

            // On programme le prochain tir de cet alien
            e.prochainTir = maintenant + INTERVALLE_TIR_ALIEN;
          }
        }
      }

      // Le personnage ramasse les pièces qu'il touche : leur valeur va dans
      // l'inventaire (etat.pieces) et la pièce disparaît du sol.
      function ramasserPieces() {
        for (const p of etat.piecesAuSol) {
          const d = distance(etat.x, etat.y, p.x, p.y);
          // Dans la portée de l'aimant : la pièce est attirée vers le personnage.
          if (d < PORTEE_AIMANT && d > 0) {
            p.x += ((etat.x - p.x) / d) * VITESSE_AIMANT;
            p.y += ((etat.y - p.y) / d) * VITESSE_AIMANT;
          }
          // Assez proche : on la ramasse.
          if (d < RAYON_VAISSEAU + RAYON_PIECE) {
            etat.pieces += p.valeur;
            p.ramassee = true;
          }
        }

        etat.piecesAuSol = etat.piecesAuSol.filter(function (p) {
          return !p.ramassee;
        });
      }

      // Le personnage subit "degats" points de dégâts, puis devient invincible
      // un court instant. (Utilisé pour les contacts ET les tirs d'aliens.)
      function subirChoc(degats) {
        etat.pv -= degats; // on enlève les points de vie

        // On devient invincible un court instant pour ne pas tout reperdre d'un coup
        etat.invincibleJusqua = Date.now() + INVINCIBLE_DUREE;

        // Plus de points de vie : la partie est finie
        if (etat.pv <= 0) {
          etat.pv = 0; // pour ne pas afficher de PV négatifs
          etat.partieFinie = true;

          // On regarde AVANT d'ajouter ce score au tableau si on bat le record
          // actuel (sinon le record inclurait déjà la partie qu'on vient de finir).
          if (etat.score > meilleurScore()) {
            nouveauRecord = true; // pour afficher "Nouveau record !" à la fin
          }

          // Étape 7 : on ajoute le score de la partie au tableau, on le trie du
          // plus grand au plus petit, on ne garde que les 5 meilleurs, puis on
          // enregistre le tout dans le navigateur.
          scores.push({ nom: nomJoueur, score: etat.score });
          scores.sort(function (a, b) {
            return b.score - a.score; // ordre décroissant
          });
          scores = scores.slice(0, 5); // on ne garde que le top 5
          sauverScores();

          document.getElementById("rejouer").style.display = "block";
          boutonPause.style.display = "none"; // pas de pause sur l'écran de fin
          boutonBoutique.style.display = "none"; // ni de boutique
        }
      }

      // Le personnage est-il touché ? (par un ennemi au contact, OU par un tir d'alien)
      // On ne teste pas si on est déjà invincible après un choc récent.
      // Chaque danger enlève sa valeur "degats" (alien 15, astéroïde 10).
      function gererCollisionVaisseau() {
        if (Date.now() < etat.invincibleJusqua) return;

        // Contact direct avec un ennemi
        for (const e of etat.ennemis) {
          if (distance(etat.x, etat.y, e.x, e.y) < e.rayon + RAYON_VAISSEAU) {
            subirChoc(e.degats);
            return; // un seul choc à la fois
          }
        }

        // Touché par un tir d'alien
        for (const t of etat.tirsAliens) {
          if (
            distance(etat.x, etat.y, t.x, t.y) <
            RAYON_TIR_ALIEN + RAYON_VAISSEAU
          ) {
            t.touche = true; // le tir disparaît après avoir touché
            subirChoc(t.degats);
            return;
          }
        }
      }

      // Un missile touche-t-il un ennemi ? Si oui : explosion + score.
      function gererTirs() {
        for (const missile of etat.missiles) {
          for (const e of etat.ennemis) {
            const d = distance(missile.x, missile.y, e.x, e.y);

            if (d < e.rayon) {
              missile.touche = true; // le missile est consommé au contact
              e.pv -= missile.degats; // l'ennemi perd des points de vie

              // L'ennemi n'est détruit que si ses PV tombent à 0
              if (e.pv <= 0) {
                e.touche = true;

                // On déclenche une explosion à la position de l'ennemi
                etat.explosions.push({
                  x: e.x,
                  y: e.y,
                  rayon: 5,
                  vie: 20,
                });

                // Le score augmente selon le type d'ennemi (+15 alien, +10 astéroïde)
                etat.score += e.valeur;

                // Pièces lâchées AU SOL (à ramasser) : valeur calculée à la
                // création selon la force de l'ennemi (type + montée des vagues)
                etat.piecesAuSol.push({ x: e.x, y: e.y, valeur: e.pieces });

                // Tous les 150 points de score : +20 points de vie (vie ET maximum).
                // (un while au cas où on franchit plusieurs paliers d'un coup)
                while (etat.score >= etat.prochainBonusPv) {
                  etat.pvMax += 20;
                  etat.pv += 20;
                  etat.prochainBonusPv += 150; // palier suivant
                }
              }

              break; // un missile ne touche qu'un seul ennemi
            }
          }
        }

        // On retire les missiles et ennemis qui ont été touchés
        etat.missiles = etat.missiles.filter(function (missile) {
          return !missile.touche;
        });
        etat.ennemis = etat.ennemis.filter(function (e) {
          return !e.touche;
        });
      }

      // Faire vivre les explosions : elles grandissent puis disparaissent.
      function animerExplosions() {
        for (const explosion of etat.explosions) {
          explosion.rayon += 2; // le cercle grandit
          explosion.vie -= 1; // et se rapproche de la fin
        }

        etat.explosions = etat.explosions.filter(function (explosion) {
          return explosion.vie > 0;
        });
      }

      // La boucle du jeu : à lire de haut en bas, ça résume tout le jeu.
      function boucle() {
        // En pause : on ne met rien à jour, on dessine juste l'écran (avec le
        // voile "Pause") et on arrête la boucle. Elle repart via basculerPause().
        if (etat.enPause) {
          rendu();
          return;
        }

        gererVagues();
        gererLaser();
        deplacerVaisseau();
        gererVaisseaux();
        gererTirsAliens();
        deplacerMissiles();
        deplacerEnnemis();
        deplacerTirsAliens();
        gererCollisionVaisseau();
        ramasserPieces();
        gererTirs();
        animerExplosions();
        rendu();

        // Si la partie est finie, on ne relance pas la boucle : le jeu se fige
        if (etat.partieFinie) return;

        // Recommencer la boucle
        requestAnimationFrame(boucle);
      }

      // Le bouton Pause
      const boutonPause = document.getElementById("pause");

      // Mettre le jeu en pause (sans effet si déjà en pause).
      function mettrePause() {
        if (etat.enPause) return;
        etat.enPause = true;
        etat.pauseDebut = Date.now(); // pour recaler les minuteurs au retour
        boutonPause.classList.add("lecture"); // l'icône devient un triangle "lecture"
      }

      // Reprendre le jeu (sans effet si pas en pause).
      function reprendre() {
        if (!etat.enPause) return;
        // on décale tous les minuteurs de la durée de la pause, sinon on aurait
        // une rafale de tirs/apparitions au redémarrage
        const ecoule = Date.now() - etat.pauseDebut;
        etat.prochainSpawn += ecoule;
        etat.invincibleJusqua += ecoule;
        if (etat.laser.phase !== "inactif") etat.laser.finPhase += ecoule;
        for (const v of etat.vaisseaux) v.prochainTir += ecoule;
        for (const e of etat.ennemis) {
          if (e.type === "alien") e.prochainTir += ecoule;
        }
        etat.enPause = false;
        boutonPause.classList.remove("lecture"); // l'icône redevient deux barres
        boucle(); // on relance la boucle
      }

      // Le bouton Pause bascule entre les deux.
      function basculerPause() {
        if (etat.partieFinie) return; // pas de pause si la partie est finie
        if (menuAmeliorations.classList.contains("ouvert")) return; // pas via la boutique
        if (etat.enPause) reprendre();
        else mettrePause();
      }

      // Pause au clic / au doigt sur le bouton
      boutonPause.addEventListener("click", basculerPause);

      // --- LA BOUTIQUE D'AMÉLIORATIONS ---
      const boutonBoutique = document.getElementById("boutique");
      const menuAmeliorations = document.getElementById("ameliorations");
      const boutiquePieces = document.getElementById("boutique-pieces");
      const boutiqueListe = document.getElementById("boutique-liste");
      const boutonFermer = document.getElementById("fermer-boutique");

      // De combien le prix d'une amélioration grimpe à chaque achat (x1.2).
      const FACTEUR_COUT = 1.2;

      // La liste des améliorations : nom, coût en pièces, effet, et parfois une
      // condition (possible) pour pouvoir l'acheter.
      const AMELIORATIONS = [
        {
          nom: "Ajouter un vaisseau",
          cout: 25,
          // impossible si on est déjà au maximum : il faut alors fusionner
          possible: function () {
            return etat.vaisseaux.length < MAX_VAISSEAUX;
          },
          appliquer: function () {
            // un vaisseau neuf est toujours au niveau de base (0)
            etat.vaisseaux.push({ angle: 0, prochainTir: 0, niveau: 0 });
            // on ré-espace tous les vaisseaux régulièrement autour du cercle
            const n = etat.vaisseaux.length;
            for (let i = 0; i < n; i++) {
              etat.vaisseaux[i].angle = (i / n) * Math.PI * 2;
            }
          },
        },
        {
          nom: "Combiner 2 vaisseaux (x1.5 puissance)",
          cout: 42,
          // possible seulement si DEUX vaisseaux ont le même niveau
          possible: function () {
            const niveaux = etat.vaisseaux
              .map(function (v) {
                return v.niveau;
              })
              .sort(function (a, b) {
                return a - b;
              });
            for (let i = 0; i < niveaux.length - 1; i++) {
              if (niveaux[i] === niveaux[i + 1]) return true;
            }
            return false;
          },
          appliquer: function () {
            // on cherche deux vaisseaux de même niveau (les plus bas d'abord)
            const tries = etat.vaisseaux.slice().sort(function (a, b) {
              return a.niveau - b.niveau;
            });
            for (let i = 0; i < tries.length - 1; i++) {
              if (tries[i].niveau === tries[i + 1].niveau) {
                const a = tries[i];
                const b = tries[i + 1];
                // on retire ces deux vaisseaux...
                etat.vaisseaux = etat.vaisseaux.filter(function (v) {
                  return v !== a && v !== b;
                });
                // ...et on en met un seul, de niveau supérieur (plus puissant et
                // d'une autre couleur)
                etat.vaisseaux.push({
                  angle: 0,
                  prochainTir: 0,
                  niveau: a.niveau + 1,
                });
                break;
              }
            }
            // on ré-espace tous les vaisseaux régulièrement autour du cercle
            const n = etat.vaisseaux.length;
            for (let i = 0; i < n; i++) {
              etat.vaisseaux[i].angle = (i / n) * Math.PI * 2;
            }
          },
        },
        {
          nom: "Vitesse des balles +1",
          cout: 15,
          appliquer: function () {
            etat.vitesseMissile += 1;
          },
        },
        {
          nom: "Points de vie +10",
          cout: 12,
          appliquer: function () {
            etat.pvMax += 10;
            etat.pv += 10;
          },
        },
        {
          nom: "Puissance des tirs x1.2",
          cout: 20,
          appliquer: function () {
            etat.degatsMissile *= 1.2;
          },
        },
      ];

      // Acheter une amélioration si on a assez de pièces (et que c'est possible).
      function acheter(a) {
        if (etat.pieces < a.cout) return;
        if (a.possible && !a.possible()) return;
        etat.pieces -= a.cout;
        a.appliquer();
        a.cout = Math.round(a.cout * FACTEUR_COUT); // plus chère la prochaine fois
        rafraichirBoutique(); // mettre à jour l'affichage
      }

      // On crée un bouton par amélioration, une seule fois au démarrage.
      const boutonsAmelioration = [];
      for (const a of AMELIORATIONS) {
        a.coutBase = a.cout; // on garde le prix de départ pour le réinitialiser au Rejouer
        const b = document.createElement("button");
        b.textContent = a.nom + " — " + a.cout + " pièces";
        b.addEventListener("click", function () {
          acheter(a);
        });
        boutiqueListe.appendChild(b);
        boutonsAmelioration.push({ bouton: b, amelioration: a });
      }

      // Mettre à jour le menu : pièces affichées + boutons grisés si pas achetables.
      function rafraichirBoutique() {
        boutiquePieces.textContent = "Pièces : " + etat.pieces;
        for (const item of boutonsAmelioration) {
          const a = item.amelioration;
          // on réécrit le libellé pour montrer le coût courant (qui a pu monter)
          item.bouton.textContent = a.nom + " — " + a.cout + " pièces";
          const tropCher = etat.pieces < a.cout;
          const impossible = a.possible && !a.possible();
          item.bouton.disabled = tropCher || impossible;
        }
      }

      // Ouvrir la boutique : on met en pause et on affiche le menu.
      function ouvrirBoutique() {
        if (etat.partieFinie) return;
        mettrePause();
        rafraichirBoutique();
        menuAmeliorations.classList.add("ouvert");
      }

      // Fermer la boutique : on cache le menu et on reprend le jeu.
      function fermerBoutique() {
        menuAmeliorations.classList.remove("ouvert");
        reprendre();
      }

      boutonBoutique.addEventListener("click", ouvrirBoutique);
      boutonFermer.addEventListener("click", fermerBoutique);

      // Relancer une nouvelle partie : on remet tout l'état à zéro
      function rejouer() {
        etat = etatInitial();
        nouveauRecord = false; // on oublie le record battu de la partie précédente
        demarrerVague(); // prépare la vague 1

        // on remet les prix des améliorations à leur valeur de départ
        for (const a of AMELIORATIONS) a.cout = a.coutBase;

        // On cache le bouton Rejouer, on réaffiche le bouton Pause, et on relance
        document.getElementById("rejouer").style.display = "none";
        boutonPause.style.display = "flex";
        boutonPause.classList.remove("lecture"); // icône deux barres
        boutonBoutique.style.display = "block"; // on réaffiche la boutique
        menuAmeliorations.classList.remove("ouvert"); // on s'assure que le menu est fermé
        boucle();
      }

      // Quand on clique sur le bouton Rejouer
      document.getElementById("rejouer").addEventListener("click", rejouer);

      // Étape 0 : on demande son nom au joueur avant de lancer la partie.
      // prompt() renvoie null si on annule : dans ce cas (ou si c'est vide),
      // on garde le nom par défaut "Anonyme".
      const nomSaisi = prompt("Ton nom ?");
      if (nomSaisi && nomSaisi.trim() !== "") {
        nomJoueur = nomSaisi.trim();
      }

      // Préparer la vague 1, puis lancer la boucle
      demarrerVague();
      boucle();
    </script>
  </body>
</html>
